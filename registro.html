<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Olimpiadas PERU - Registro</title>
    <link rel="stylesheet" href="style.css" />
    <meta
      name="description"
      content="Regístrate para participar en las Olimpiadas Internas UTP. Formulario de inscripción para deportistas."
    />
  </head>
  <body>
    <header>
      <div class="nav-container">
        <a href="index.html" class="logo">Olimpiadas<span>PERU</span></a>
        <nav>
          <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="nosotros.html">Nosotros</a></li>
            <li><a href="registro.html" class="active">Registro</a></li>
            <li><a href="posiciones.html">Posiciones</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section class="form-container">
        <h2>Inscripción de Deportistas</h2>
        <form action="#" method="POST">
          <div class="form-group">
            <label for="nombre">Nombres Completos:</label>
            <input
              type="text"
              id="nombre"
              name="nombre"
              placeholder="Ej. Juan Pérez"
              required
            />
          </div>

          <div class="form-group">
            <label for="codigo">Código de Alumno (UTP):</label>
            <input
              type="text"
              id="codigo"
              name="codigo"
              placeholder="Ej. U20234567"
              required
            />
          </div>

          <div class="form-group">
            <label for="correo">Correo Institucional:</label>
            <input
              type="email"
              id="correo"
              name="correo"
              placeholder="ejemplo@utp.edu.pe"
              required
            />
          </div>

          <div class="form-group">
            <label for="deporte">Deporte a Participar:</label>
            <select id="deporte" name="deporte" required>
              <option value="" disabled selected>
                Selecciona una disciplina
              </option>
              <option value="futbol">Fútbol</option>
              <option value="voley">Vóley</option>
              <option value="basquet">Básquet</option>
              <option value="atletismo">Atletismo</option>
              <option value="ajedrez">Ajedrez</option>
              <option value="natacion">Natación</option>
            </select>
          </div>

          <button type="submit" class="submit-btn">Enviar Inscripción</button>
        </form>
      </section>
    </main>

    <footer>
      <div class="footer-content">
        <p>&copy; 2026 Universidad Tecnológica del Perú - Olimpiadas PERU.</p>
        <p>Contacto: deportes@utp.edu.pe | Teléfono: (01) 315 9600</p>
      </div>
    </footer>
  </body>
</html>
